<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RollCall — South Portland Metro APA</title>
  <meta name="description" content="Register your team for the next South Portland Metro APA league session.">
  <meta property="og:title" content="RollCall — Session Registration">
  <meta property="og:description" content="Register your team for the next South Portland Metro APA league session. Re-register existing teams or sign up new ones.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://southportlandmetroapa.github.io/rollcall/">
  <meta property="og:site_name" content="South Portland Metro APA">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://southportlandmetroapa.github.io/shared/spm-base.css">
  <style>
    /* ── Header (match PatchCheck/MultiPass branding) ─────────────── */
    .spm-header .title {
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1.08;
      margin: 0;
    }
    .spm-header .subtitle-group {
      display: inline-block;
      margin-top: 8px;
    }
    .spm-header .subtitle {
      font-size: 1.6rem;
      font-weight: 400;
      font-style: italic;
      opacity: 0.95;
      margin: 0;
    }
    .spm-header .app-pill {
      display: inline-block;
      margin-top: 4px;
      padding: 3px 14px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.5);
    }

    /* ── Auth Screen ──────────────────────────────────────────────── */
    .auth-wrap {
      max-width: 480px;
      margin: 60px auto 0;
      text-align: center;
    }
    .auth-wrap p { color: var(--muted); margin: 8px 0 20px; }
    .auth-row {
      display: flex;
      gap: 8px;
    }
    .auth-row input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      outline: none;
      min-height: 48px;
    }
    .auth-row input:focus { border-color: var(--spm-accent); }

    /* ── Dashboard ────────────────────────────────────────────────── */
    .welcome-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 20px;
      display: inline-block;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .deadline-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .closed-banner {
      background: #f8d7da;
      border: 1px solid #dc3545;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: #721c24;
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 24px 0 12px;
      color: var(--text);
    }

    /* ── Team Cards ───────────────────────────────────────────────── */
    .teams-grid {
      display: grid;
      gap: 12px;
    }
    @media (min-width: 768px) {
      .teams-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .team-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    @media (hover: hover) {
      .team-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    }
    .team-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .team-card-name {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .team-card-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .badge-registered {
      background: #d4edda;
      color: #155724;
    }
    .badge-not-returning {
      background: #f8d7da;
      color: #721c24;
    }
    .badge-pending {
      background: #e9ecef;
      color: #495057;
    }

    /* ── Action Modal (team click popup) ──────────────────────────── */
    .action-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    .action-modal.active { display: flex; }
    .action-modal-box {
      background: #fff;
      border-radius: 22px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    .action-modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .action-modal-meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .action-modal-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .action-modal-btns .spm-btn {
      width: 100%;
      text-align: center;
    }
    .action-modal-close {
      margin-top: 12px;
      text-align: center;
    }
    .action-modal-close button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 8px 16px;
    }
    .dj-label {
      background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ── Team Detail (expanded view) ─────────────────────────────── */
    .team-detail {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .team-detail.open { display: block; }
    .team-card-roster {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .team-card-roster .captain { font-weight: 600; color: var(--text); }
    .dj-columns {
      display: grid;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .dj-columns { grid-template-columns: 1fr 1fr; }
    }
    .dj-sub {}
    .dj-sub-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--spm-accent);
      margin-bottom: 4px;
    }

    /* ── Registration Form ────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      min-height: 44px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--spm-accent);
    }
    .form-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Roster Builder ───────────────────────────────────────────── */
    .roster-columns {
      display: grid;
      gap: 16px;
    }
    @media (min-width: 768px) {
      .roster-columns { grid-template-columns: 1fr 1fr; }
    }
    .roster-section { margin-bottom: 20px; }
    .roster-section-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .roster-count {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 400;
    }
    .roster-count.under { color: var(--spm-primary); }
    .roster-count.ok { color: #28a745; }
    .roster-entry {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
    }
    .roster-entry-name { flex: 1; min-width: 120px; }
    .roster-entry-name .manual-badge {
      background: #fff3cd;
      color: #856404;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 4px;
    }
    .roster-entry-name .dup-warning {
      display: block;
      font-size: 0.75rem;
      color: var(--spm-primary);
      margin-top: 2px;
    }
    .roster-entry select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.85rem;
      min-height: 36px;
    }
    .role-btns { display: flex; gap: 4px; }
    .role-btn {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: var(--muted);
      min-height: 32px;
      min-width: 32px;
      text-align: center;
      transition: all 0.1s;
    }
    .role-btn.active-captain {
      background: var(--spm-accent);
      color: #fff;
      border-color: var(--spm-accent);
    }
    .role-btn.active-cocaptain {
      background: #6c757d;
      color: #fff;
      border-color: #6c757d;
    }
    .roster-entry .remove-btn {
      background: none;
      border: none;
      color: var(--spm-primary);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px 8px;
      min-width: 36px;
      min-height: 36px;
    }
    .add-player-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .add-player-row input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.9rem;
      min-height: 44px;
    }

    /* ── Manual Entry Inline ──────────────────────────────────────── */
    .manual-entry-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .manual-entry-row input {
      flex: 1;
      border: 2px solid #ffc107;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.9rem;
      min-height: 44px;
    }

    /* ── Confirmation Screen ──────────────────────────────────────── */
    .confirm-card {
      text-align: center;
      padding: 24px;
    }
    .confirm-card .checkmark {
      font-size: 3rem;
      color: #28a745;
      margin-bottom: 12px;
    }
    .confirm-warnings {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 12px;
      padding: 12px;
      margin-top: 16px;
      text-align: left;
      font-size: 0.85rem;
    }

    /* ── Request Division Form ────────────────────────────────────── */
    .request-form textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* ── Not Found Card ───────────────────────────────────────────── */
    .not-found-card {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    /* ── Action Bar (bottom fixed on mobile) ──────────────────────── */
    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .action-bar .spm-btn { flex: 1; min-width: 140px; }

    /* ── Loading Modal ────────────────────────────────────────────── */
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .loading-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loading-modal.active { display: flex; }
    .loading-modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--spm-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-modal-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Utility ──────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-16 { margin-top: 16px; }
    .mb-8 { margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="spm-page" id="app">

  <!-- ═══ Header ═══ -->
  <div class="spm-header">
    <h1 class="title">South Portland Metro APA</h1>
    <div class="subtitle-group">
      <div class="subtitle">RollCall</div>
      <div class="app-pill">Session Registration</div>
    </div>
  </div>

  <!-- ═══ Screen: Auth ═══ -->
  <div id="screenAuth">
    <div class="auth-wrap">
      <div class="spm-card">
        <h2 style="margin:0 0 4px">Register for Next Session</h2>
        <p>Enter your APA number or email to get started.</p>
        <div class="auth-row">
          <input type="text" id="authInput" placeholder="APA # or email"
                 onkeydown="if(event.key==='Enter')doLookup()">
          <button class="spm-btn spm-btn-primary" onclick="doLookup()">Look Up</button>
        </div>
        <div id="authError" class="form-hint" style="color:var(--spm-primary);margin-top:8px"></div>
      </div>
    </div>
  </div>

  <!-- ═══ Screen: Dashboard ═══ -->
  <div id="screenDashboard" class="hidden">
    <div id="welcomeArea"></div>
    <div id="deadlineArea"></div>
    <div id="teamsArea"></div>
    <div class="action-bar" id="dashActions">
      <button class="spm-btn spm-btn-primary" onclick="showNewTeamForm()">+ Register New Team</button>
      <button class="spm-btn spm-btn-secondary" onclick="showRequestForm()">Request a Division</button>
    </div>
  </div>

  <!-- ═══ Screen: Registration Form ═══ -->
  <div id="screenRegForm" class="hidden">
    <div class="spm-card">
      <h2 id="regFormTitle" style="margin:0 0 16px">Register Team</h2>
      <div id="regFormContent"></div>
    </div>
  </div>

  <!-- ═══ Screen: Confirmation ═══ -->
  <div id="screenConfirm" class="hidden"></div>

  <!-- ═══ Screen: Request Division ═══ -->
  <div id="screenRequest" class="hidden">
    <div class="spm-card request-form">
      <h2 style="margin:0 0 16px">Request a Division</h2>
      <div class="form-group">
        <label>Describe the division you'd like</label>
        <textarea id="requestText" placeholder="e.g., Wednesday night 8-Ball in the Beaverton area"></textarea>
        <div class="form-hint">Include format, day, time, and area if possible.</div>
      </div>
      <div class="action-bar">
        <button class="spm-btn spm-btn-primary" onclick="submitRequest()">Submit Request</button>
        <button class="spm-btn spm-btn-secondary" onclick="showDashboard()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ═══ Status ═══ -->
  <div id="statusText" class="text-center mt-16" style="color:var(--muted);font-size:0.85rem"></div>

  <div class="spm-footer">South Portland Metro APA &middot; RollCall</div>
</div>

<!-- ═══ Action Modal (team click popup) ═══ -->
<div class="action-modal" id="actionModal">
  <div class="action-modal-box">
    <div class="action-modal-title" id="actionModalTitle"></div>
    <div class="action-modal-meta" id="actionModalMeta"></div>
    <div class="action-modal-btns" id="actionModalBtns"></div>
    <div class="action-modal-close"><button onclick="hideActionModal()">Cancel</button></div>
  </div>
</div>

<!-- ═══ Loading Modal (overlay) ═══ -->
<div class="loading-modal" id="loadingModal">
  <div class="loading-modal-box">
    <div class="loading-spinner"></div>
    <div class="loading-modal-text" id="loadingModalText">Looking up...</div>
  </div>
</div>

<!-- ═══ Shared Core ═══ -->
<script>
  window.SPM_CONFIG = {
    apiUrl: 'https://rollcall.spmapa.workers.dev'
  };
</script>
<script src="https://southportlandmetroapa.github.io/shared/spm-core.js"></script>

<script>
// ========================================================================
// RollCall — Player Frontend
// ========================================================================
// Screens: Auth → Dashboard → Registration Form → Confirmation
//          Dashboard → Request Division
// ========================================================================

var currentPlayer = null;     // { memberNumber, firstName, lastName, email, phone }
var currentTeams = [];        // enriched team array from lookupPlayer
var availableDivisions = [];  // from getAvailableDivisions
var registrationOpen = true;
var registrationDeadline = null;

// Roster state for the registration form
var currentRoster = [];           // non-DJ: [{ memberNumber, playerName, role, manualEntry }]
var currentRoster8 = [];          // DJ: 8-ball roster
var currentRoster9 = [];          // DJ: 9-ball roster
var pendingManualApa = '';        // APA# waiting for manual name entry
var pendingManualFormat = '';     // "8", "9", or "" — which roster the manual entry is for
var currentFormDivision = null;   // selected division object
var currentFormDayTime = '';      // "Monday|6:30 PM" — selected day+time
var currentFormIsReReg = false;
var currentFormOrigTeam = '';
var currentFormIsDj = false;

// ── Short time display ─────────────────────────────────────────────
// "6:30 PM" → "6:30p", "12:00 PM" → "12p", "1:00 PM" → "1p"
function shortTimeStr(t) {
  if (!t) return '';
  var m = t.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!m) return t;
  var hr = m[1], min = m[2], ampm = m[3].toLowerCase().charAt(0);
  return min === '00' ? hr + ampm : hr + ':' + min + ampm;
}

// ── Loading modal ──────────────────────────────────────────────────
function showLoading(text) {
  document.getElementById('loadingModalText').textContent = text || 'Loading...';
  document.getElementById('loadingModal').classList.add('active');
}
function hideLoading() {
  document.getElementById('loadingModal').classList.remove('active');
}

// ── Screen navigation ──────────────────────────────────────────────
function showScreen(id) {
  var screens = ['screenAuth', 'screenDashboard', 'screenRegForm', 'screenConfirm', 'screenRequest'];
  for (var i = 0; i < screens.length; i++) {
    document.getElementById(screens[i]).classList.toggle('hidden', screens[i] !== id);
  }
}

function showDashboard() { showScreen('screenDashboard'); }

// ── Auth / Lookup ──────────────────────────────────────────────────
function doLookup() {
  var input = document.getElementById('authInput').value.trim();
  if (!input) {
    document.getElementById('authError').textContent = 'Please enter your APA number or email.';
    return;
  }
  document.getElementById('authError').textContent = '';
  showLoading('Looking up your teams...');

  SPM.callServer('lookupPlayer', { input: input }).then(function(data) {
    if (!data.success) {
      hideLoading();
      document.getElementById('authError').textContent = data.error || 'Lookup failed.';
      return;
    }
    if (!data.found) {
      hideLoading();
      document.getElementById('authError').textContent = data.message || 'Not found.';
      return;
    }

    currentPlayer = data.player;
    currentTeams = data.teams || [];
    registrationOpen = data.registrationOpen;
    registrationDeadline = data.deadline;

    // Fetch available divisions in parallel
    SPM.callServer('getAvailableDivisions').then(function(divData) {
      hideLoading();
      availableDivisions = (divData.success && divData.divisions) ? divData.divisions : [];
      renderDashboard();
      showScreen('screenDashboard');
    });
  }).catch(function(err) {
    hideLoading();
    document.getElementById('authError').textContent = 'Network error. Please try again.';
  });
}

// ── Dashboard Rendering ────────────────────────────────────────────
function renderDashboard() {
  var esc = SPM.esc;

  // Welcome
  document.getElementById('welcomeArea').innerHTML =
    '<div class="welcome-pill">Welcome, ' + esc(currentPlayer.firstName) + ' ' +
    esc(currentPlayer.lastName) + ' (' + esc(currentPlayer.memberNumber) + ')</div>';

  // Deadline / closed banner
  var deadlineHtml = '';
  if (!registrationOpen) {
    deadlineHtml = '<div class="closed-banner">Registration is closed.' +
      (registrationDeadline ? ' The deadline was ' + esc(registrationDeadline) + '.' : '') +
      ' Contact the league operator for late registration.</div>';
  } else if (registrationDeadline) {
    deadlineHtml = '<div class="deadline-banner">Registration deadline: <strong>' +
      esc(registrationDeadline) + '</strong></div>';
  }
  document.getElementById('deadlineArea').innerHTML = deadlineHtml;

  // Disable registration buttons if closed
  var dashBtns = document.getElementById('dashActions');
  if (!registrationOpen) {
    dashBtns.classList.add('hidden');
  } else {
    dashBtns.classList.remove('hidden');
  }

  // Team cards — compact by default, click to expand
  var teamsHtml = '<div class="section-title">Your Current Teams</div>';

  if (currentTeams.length === 0) {
    teamsHtml += '<div class="spm-card not-found-card">You are not on any teams this session.</div>';
  } else {
    teamsHtml += '<div class="teams-grid">';
    for (var i = 0; i < currentTeams.length; i++) {
      teamsHtml += buildTeamCard(currentTeams[i], i);
    }
    teamsHtml += '</div>';
  }

  document.getElementById('teamsArea').innerHTML = teamsHtml;
}

function buildTeamCard(team, index) {
  var esc = SPM.esc;
  var status = team.registrationStatus;  // "submitted", "not_returning", or null

  // Badge class and label
  var badgeCls, badgeLabel;
  if (status === 'submitted') {
    badgeCls = 'badge-registered'; badgeLabel = 'Registered';
  } else if (status === 'not_returning') {
    badgeCls = 'badge-not-returning'; badgeLabel = 'Not Returning';
  } else {
    badgeCls = 'badge-pending'; badgeLabel = 'Pending';
  }

  // Clicking card opens action modal (captains) or expands detail (non-captains)
  var clickAction = (registrationOpen && team.canRegister)
    ? 'showActionModal(' + index + ')'
    : 'toggleDetail(' + index + ')';

  var html = '<div class="team-card" onclick="' + clickAction + '">';

  // Header row: name + status badge
  html += '<div class="team-card-header">';
  if (team.isDjPair) {
    html += '<div>';
    html += '<span class="dj-label">DJ</span> ';
    html += '<span class="team-card-name">' + esc(team.eightBallTeam.teamName || team.baseName) + '</span>';
    html += '</div>';
  } else {
    html += '<span class="team-card-name">' + esc(team.teamName) + '</span>';
  }
  html += '<span class="spm-badge ' + badgeCls + '">' + badgeLabel + '</span>';
  html += '</div>';

  // Compact meta line (always visible)
  if (team.isDjPair) {
    var seen = {};
    for (var u8 = 0; u8 < team.eightBallTeam.roster.length; u8++) seen[team.eightBallTeam.roster[u8].memberNumber] = true;
    for (var u9 = 0; u9 < team.nineBallTeam.roster.length; u9++) seen[team.nineBallTeam.roster[u9].memberNumber] = true;
    var uniqueCount = Object.keys(seen).length;
    html += '<div class="team-card-meta">' + esc(team.day) + ' &middot; ' +
      esc(team.eightBallTeam.venue || team.nineBallTeam.venue) +
      ' &middot; ' + uniqueCount + ' players</div>';
  } else {
    html += '<div class="team-card-meta">#' + esc(team.teamNumber) + ' &middot; ' +
      esc(team.day) + ' &middot; ' + esc(team.format) +
      ' &middot; ' + team.roster.length + ' players</div>';
  }

  // Expandable detail (for non-captains, or when accessed via action modal)
  html += '<div class="team-detail" id="detail-' + index + '">';
  if (team.isDjPair) {
    html += '<div class="dj-columns">';
    html += '<div class="dj-sub">';
    html += '<div class="dj-sub-label">8-Ball &middot; Team #' + esc(team.eightBallTeam.teamNumber) + '</div>';
    html += buildRosterSummary(team.eightBallTeam.roster);
    html += '</div>';
    html += '<div class="dj-sub">';
    html += '<div class="dj-sub-label">9-Ball &middot; Team #' + esc(team.nineBallTeam.teamNumber) + '</div>';
    html += buildRosterSummary(team.nineBallTeam.roster);
    html += '</div>';
    html += '</div>';
  } else {
    html += '<div class="team-card-meta">' + esc(team.venue) + '</div>';
    html += buildRosterSummary(team.roster);
  }
  html += '</div>'; // end detail

  html += '</div>'; // end card
  return html;
}

function toggleDetail(index) {
  var el = document.getElementById('detail-' + index);
  if (el) el.classList.toggle('open');
}

// ── Action Modal (team click popup for captains) ───────────────────
function showActionModal(index) {
  var team = currentTeams[index];
  var esc = SPM.esc;
  var status = team.registrationStatus;

  var name = team.isDjPair ? (team.eightBallTeam.teamName || team.baseName) : team.teamName;
  var meta = team.day;
  if (team.isDjPair) {
    meta += ' &middot; ' + esc(team.eightBallTeam.venue || team.nineBallTeam.venue);

    meta += ' &middot; ' + esc(team.format) + ' &middot; ' + esc(team.venue);
  }

  document.getElementById('actionModalTitle').textContent = name;
  document.getElementById('actionModalMeta').innerHTML = meta;

  var btnsHtml = '';

  if (status === 'submitted') {

    btnsHtml += '<button class="spm-btn spm-btn-danger" onclick="hideActionModal();cancelReg(\'' + esc(regId) + '\')">Cancel Registration</button>';
  } else if (status === 'not_returning') {
    // Already marked not returning — show undo
    var regId2 = team.registrationId || team.djPairId || '';
    btnsHtml += '<button class="spm-btn spm-btn-secondary" onclick="hideActionModal();cancelReg(\'' + esc(regId2) + '\')">Undo Not Returning</button>';
  } else {
    // Pending — show all three options
    btnsHtml += '<button class="spm-btn spm-btn-primary" onclick="hideActionModal();quickReRegister(' + index + ')">Re-Register (Same Team)</button>';
    btnsHtml += '<button class="spm-btn spm-btn-secondary" onclick="hideActionModal();startReRegister(' + index + ')">Re-Register with Changes</button>';
    btnsHtml += '<button class="spm-btn spm-btn-danger" onclick="hideActionModal();markNotReturning(' + index + ')">Not Returning</button>';

}

function hideActionModal() {
  document.getElementById('actionModal').classList.remove('active');
}

// ── Quick Re-Register (same team, no changes) ─────────────────────
function quickReRegister(teamIndex) {
  var team = currentTeams[teamIndex];

  // Find matching division from availableDivisions by day + format
  var divisionId = '';
  var pIsDj = team.isDjPair;
  var day = team.day;

  for (var i = 0; i < availableDivisions.length; i++) {
    var d = availableDivisions[i];
    if (d.day !== day) continue;
    var fmt = d.format.toLowerCase();
    if (pIsDj && fmt.indexOf('dj') !== -1) { divisionId = d.divisionId; break; }
    if (!pIsDj && team.format && fmt.indexOf(team.format.toLowerCase().split(' ')[0]) !== -1) { divisionId = d.divisionId; break; }
  }

  if (!divisionId) {
    // Fallback: first division matching day
    for (var j = 0; j < availableDivisions.length; j++) {
      if (availableDivisions[j].day === day) { divisionId = availableDivisions[j].divisionId; break; }
    }
  }

  if (!divisionId) {
    alert('No matching division found for ' + day + '. Please use "Re-Register with Changes".');
    return;
  }

  var payload = {
    isReRegistration: true,
    registeredBy: currentPlayer.memberNumber,
    divisionId: divisionId,
    isDjPair: pIsDj
  };

  if (pIsDj) {
    payload.teamName = team.eightBallTeam.teamName || team.baseName;
    payload.hostLocation = team.eightBallTeam.venue || team.nineBallTeam.venue;
    payload.originalTeamNumber = team.eightBallTeam.teamNumber;

    // Extract captains from rosters
    var capt8 = '', coCapt8 = '', capt9 = '', coCapt9 = '';
    for (var r8 = 0; r8 < team.eightBallTeam.roster.length; r8++) {
      if (team.eightBallTeam.roster[r8].role === 'Captain') capt8 = team.eightBallTeam.roster[r8].memberNumber;
      if (team.eightBallTeam.roster[r8].role === 'Co-Captain') coCapt8 = team.eightBallTeam.roster[r8].memberNumber;
    }
    for (var r9 = 0; r9 < team.nineBallTeam.roster.length; r9++) {
      if (team.nineBallTeam.roster[r9].role === 'Captain') capt9 = team.nineBallTeam.roster[r9].memberNumber;
      if (team.nineBallTeam.roster[r9].role === 'Co-Captain') coCapt9 = team.nineBallTeam.roster[r9].memberNumber;
    }
    payload.captain = capt8 || capt9 || currentPlayer.memberNumber;
    payload.coCaptain = coCapt8 || coCapt9 || '';
    payload.eightBallRoster = team.eightBallTeam.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player' };
    });
    payload.nineBallRoster = team.nineBallTeam.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player' };
    });
  } else {
    payload.teamName = team.teamName;
    payload.hostLocation = team.venue;
    payload.originalTeamNumber = team.teamNumber;
    var capt = '', coCapt = '';
    for (var rr = 0; rr < team.roster.length; rr++) {
      if (team.roster[rr].role === 'Captain') capt = team.roster[rr].memberNumber;
      if (team.roster[rr].role === 'Co-Captain') coCapt = team.roster[rr].memberNumber;
    }
    payload.captain = capt || currentPlayer.memberNumber;
    payload.coCaptain = coCapt || '';
    payload.roster = team.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player' };
    });
  }

  showLoading('Registering same team...');
  SPM.callServer('registerTeam', payload).then(function(data) {
    hideLoading();
    if (!data.success) { alert(data.error || 'Registration failed.'); return; }
    showConfirmation(data);
  }).catch(function() {
    hideLoading();
    alert('Network error. Please try again.');
  });
}

// ── Mark Not Returning ─────────────────────────────────────────────
function markNotReturning(teamIndex) {
  var team = currentTeams[teamIndex];
  var name = team.isDjPair ? (team.eightBallTeam.teamName || team.baseName) : team.teamName;
  var origTeam = team.isDjPair ? team.eightBallTeam.teamNumber : team.teamNumber;

  if (!confirm('Mark "' + name + '" as not returning next session?')) return;

  showLoading('Updating...');
  SPM.callServer('markNotReturning', {
    memberNumber: currentPlayer.memberNumber,
    teamName: name,
    originalTeamNumber: origTeam,
    day: team.day
  }).then(function(data) {
    hideLoading();
    if (!data.success) { alert(data.error || 'Failed.'); return; }
    doLookup();  // Refresh dashboard
  }).catch(function() {
    hideLoading();
    alert('Network error.');
  });
}

function buildRosterSummary(roster) {
  var esc = SPM.esc;
  var html = '<div class="team-card-roster">';
  for (var i = 0; i < roster.length; i++) {
    var p = roster[i];
    var cls = (p.role === 'Captain' || p.role === 'Co-Captain') ? ' class="captain"' : '';
    var roleTag = p.role ? ' (' + p.role + ')' : '';
    html += '<span' + cls + '>' + esc(p.playerName) + esc(roleTag) + '</span>';
    if (i < roster.length - 1) html += ', ';
  }
  html += '</div>';
  return html;
}

// ── Cancel Registration ────────────────────────────────────────────
function cancelReg(regId) {
  if (!confirm('Cancel this registration?')) return;

  showLoading('Cancelling...');
  SPM.callServer('cancelRegistration', {
    registrationId: regId,
    memberNumber: currentPlayer.memberNumber
  }).then(function(data) {
    hideLoading();
    if (!data.success) { alert(data.error || 'Cancel failed.'); return; }
    doLookup();
  }).catch(function() {
    hideLoading();
    alert('Network error.');
  });
}

// ── Re-Register Flow ───────────────────────────────────────────────
function startReRegister(teamIndex) {
  var team = currentTeams[teamIndex];
  currentFormIsReReg = true;
  currentFormIsDj = team.isDjPair;

  if (team.isDjPair) {
    currentFormOrigTeam = team.eightBallTeam.teamNumber;
    currentFormIsDj = true;
    // Pre-fill rosters from current team data
    currentRoster8 = team.eightBallTeam.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player', manualEntry: false };
    });
    currentRoster9 = team.nineBallTeam.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player', manualEntry: false };
    });
    renderRegForm({
      title: 'Re-Register: ' + (team.eightBallTeam.teamName || team.baseName),
      teamName: team.eightBallTeam.teamName || team.baseName,
      hostLocation: team.eightBallTeam.venue || team.nineBallTeam.venue,
      isDj: true,
      preselDay: team.day,
      preselFormat: team.eightBallTeam.format || ''
    });
  } else {
    currentFormOrigTeam = team.teamNumber;
    currentFormIsDj = false;
    currentRoster = team.roster.map(function(p) {
      return { memberNumber: p.memberNumber, playerName: p.playerName, role: p.role || 'Player', manualEntry: false };
    });
    renderRegForm({
      title: 'Re-Register: ' + team.teamName,
      teamName: team.teamName,
      hostLocation: team.venue,
      isDj: false,
      preselDay: team.day,
      preselFormat: team.format || ''
    });
  }

  showScreen('screenRegForm');
}

function showNewTeamForm() {

  currentFormOrigTeam = '';
  currentRoster = [];
  currentRoster8 = [];

// ── Registration Form Rendering ────────────────────────────────────
function renderRegForm(opts) {
  document.getElementById('regFormTitle').textContent = opts.title;

  var esc = SPM.esc;
  var html = '';

  // Team name
  html += '<div class="form-group">';
  html += '<label>Team Name</label>';
  html += '<input type="text" id="regTeamName" value="' + esc(opts.teamName) + '">';
  html += '</div>';

  // Division picker — day + time only, grouped by day
  html += '<div class="form-group">';
  html += '<label>Day &amp; Time of Play</label>';
  html += '<select id="regDivision" onchange="onDivisionChange()">';
  html += '<option value="">-- Select --</option>';

  // Build unique day+time combos, each mapping to multiple division IDs
  // (e.g., "Monday 6:30 PM" covers DJ West Hills, DJ Skyline, etc.)
  // For the dropdown we group by day, showing day + time as the option.
  // The actual division (area) is determined by the host location field.
  var dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  var byDayTime = {};
  for (var i = 0; i < availableDivisions.length; i++) {
    var d = availableDivisions[i];
    var key = d.day + ' ' + d.time;
    if (!byDayTime[key]) {
      byDayTime[key] = { day: d.day, time: d.time, divIds: [], formats: {} };
    }
    byDayTime[key].divIds.push(d.divisionId);
    byDayTime[key].formats[d.format] = true;
  }

  // Sort by day order
  var dtKeys = Object.keys(byDayTime).sort(function(a, b) {
    var da = byDayTime[a], db = byDayTime[b];
    return dayOrder.indexOf(da.day) - dayOrder.indexOf(db.day);
  });

  // Pre-select for re-registration based on team's current day + format.
  // When multiple time slots exist for the same day (e.g., Sunday 1p, 2p, 7p),
  // use the team's format to pick the right slot. DJ teams match slots that
  // contain DJ format; Masters match Masters slots; etc.
  var preselValue = '';
  if (opts.preselDay) {
    var bestMatch = '';
    var dayMatch = '';
    var pFmt = (opts.preselFormat || '').toLowerCase();
    var pIsDj = opts.isDj || pFmt.indexOf('dj') !== -1;

    for (var ps = 0; ps < dtKeys.length; ps++) {
      var psCombo = byDayTime[dtKeys[ps]];
      if (psCombo.day !== opts.preselDay) continue;

      // First day match as fallback
      if (!dayMatch) dayMatch = dtKeys[ps];

      // Check if formats overlap with team's format
      var fmts = Object.keys(psCombo.formats);
      for (var pf = 0; pf < fmts.length; pf++) {
        var f = fmts[pf].toLowerCase();
        if (pIsDj && f.indexOf('dj') !== -1) { bestMatch = dtKeys[ps]; break; }
        if (pFmt && f.indexOf(pFmt.split(' ')[0]) !== -1) { bestMatch = dtKeys[ps]; break; }
      }
      if (bestMatch) break;
    }
    preselValue = bestMatch || dayMatch;
  }

  for (var dt = 0; dt < dtKeys.length; dt++) {
    var combo = byDayTime[dtKeys[dt]];
    var fmtList = Object.keys(combo.formats).sort().join(', ');
    var shortTime = shortTimeStr(combo.time);
    var label = combo.day + ' ' + shortTime + ' (' + fmtList + ')';
    var optVal = combo.day + '|' + combo.time;
    var sel = (optVal === preselValue) ? ' selected' : '';
    html += '<option value="' + esc(optVal) + '"' + sel + '>' + esc(label) + '</option>';
  }
  html += '</select>';
  html += '</div>';

  // Host location
  html += '<div class="form-group">';
  html += '<label>Host Location / Area</label>';
  html += '<input type="text" id="regHostLocation" value="' + esc(opts.hostLocation) + '" placeholder="Venue name or area">';
  html += '</div>';

  // Roster area (rendered dynamically based on DJ or not)
  html += '<div id="rosterArea"></div>';

  // Submit
  html += '<div class="action-bar">';
  html += '<button class="spm-btn spm-btn-primary" id="submitRegBtn" onclick="submitRegistration()">Submit Registration</button>';
  html += '<button class="spm-btn spm-btn-secondary" onclick="showDashboard()">Cancel</button>';
  html += '</div>';

  document.getElementById('regFormContent').innerHTML = html;

  // If pre-selected, trigger division change to set form state
  if (opts.preselDay) {
    onDivisionChange();
  }

  // Render roster(s)
  renderRosterArea();
}

function onDivisionChange() {
  var select = document.getElementById('regDivision');
  var val = select.value;  // "Monday|6:30 PM" or ""

  // Find all divisions matching this day+time
  currentFormDivision = null;
  currentFormDayTime = val;

  if (val) {
    var parts = val.split('|');
    var selDay = parts[0];
    var selTime = parts[1];

    // Find the first matching division to get min/max roster
    // Also check if any format in this day+time is DJ
    var hasDj = false;
    for (var i = 0; i < availableDivisions.length; i++) {
      var d = availableDivisions[i];
      if (d.day === selDay && d.time === selTime) {
        if (!currentFormDivision) currentFormDivision = d;
        var fmt = d.format.toLowerCase();
        if (fmt.indexOf('dj') !== -1) hasDj = true;
      }
    }

    if (hasDj !== currentFormIsDj) {
      currentFormIsDj = hasDj;
      if (hasDj) {
        currentRoster8 = currentRoster.slice();
        currentRoster9 = [];
        currentRoster = [];
      } else {
        currentRoster = currentRoster8.slice();
        currentRoster8 = [];
        currentRoster9 = [];
      }
    }
  }

  renderRosterArea();
}

function renderRosterArea() {
  var html = '';

  if (currentFormIsDj) {
    // Side by side on desktop, stacked on mobile
    html += '<div class="roster-columns">';
    html += buildRosterSection('8-Ball Roster', currentRoster8, '8');
    html += buildRosterSection('9-Ball Roster', currentRoster9, '9');
    html += '</div>';
  } else {
    html += buildRosterSection('Roster', currentRoster, '');
  }

  document.getElementById('rosterArea').innerHTML = html;
}

function buildRosterSection(title, roster, format) {
  var esc = SPM.esc;
  var min = currentFormDivision ? currentFormDivision.minRoster : 0;
  var max = currentFormDivision ? currentFormDivision.maxRoster : 0;
  var countCls = (min > 0 && roster.length < min) ? 'under' : 'ok';
  var countText = roster.length + (min || max ? ' / ' + min + '-' + max : '');

  var html = '<div class="roster-section">';
  html += '<div class="roster-section-title">';
  html += '<span>' + esc(title) + '</span>';
  html += '<span class="roster-count ' + countCls + '">' + esc(countText) + ' players</span>';
  html += '</div>';

  // Player rows — Captain/Co-Captain are toggle buttons (one each max)
  for (var i = 0; i < roster.length; i++) {
    var p = roster[i];
    html += '<div class="roster-entry">';
    html += '<div class="roster-entry-name">';
    html += esc(p.playerName) + ' <small style="color:var(--muted)">#' + esc(p.memberNumber) + '</small>';
    if (p.manualEntry) html += '<span class="manual-badge">Unverified</span>';
    if (p.dupWarning) html += '<span class="dup-warning">' + esc(p.dupWarning) + '</span>';
    html += '</div>';
    html += '<div class="role-btns">';
    var cCls = p.role === 'Captain' ? ' active-captain' : '';
    var ccCls = p.role === 'Co-Captain' ? ' active-cocaptain' : '';
    html += '<button class="role-btn' + cCls + '" onclick="toggleRole(' + i + ', \'Captain\', \'' + format + '\')" title="Captain">C</button>';
    html += '<button class="role-btn' + ccCls + '" onclick="toggleRole(' + i + ', \'Co-Captain\', \'' + format + '\')" title="Co-Captain">CC</button>';
    html += '</div>';
    html += '<button class="remove-btn" onclick="removePlayer(' + i + ', \'' + format + '\')" title="Remove">&times;</button>';
    html += '</div>';
  }

  // Add player input
  var inputId = 'addPlayerInput' + format;
  html += '<div class="add-player-row">';
  html += '<input type="text" id="' + inputId + '" placeholder="APA # to add" onkeydown="if(event.key===\'Enter\')addPlayer(\'' + format + '\')">';
  html += '<button class="spm-btn spm-btn-secondary" onclick="addPlayer(\'' + format + '\')">Add</button>';
  html += '</div>';

  // Manual entry area (shown when APA# not found)
  var manualId = 'manualArea' + format;
  html += '<div id="' + manualId + '"></div>';

  html += '</div>';
  return html;
}

function getRoster(format) {
  if (format === '8') return currentRoster8;
  if (format === '9') return currentRoster9;
  return currentRoster;
}

function toggleRole(index, role, format) {
  var roster = getRoster(format);

  // If clicking the same role that's already set, clear it (back to Player)
  if (roster[index].role === role) {
    roster[index].role = 'Player';
    renderRosterArea();
    return;
  }

  // Clear this role from whoever currently has it (enforce one captain, one co-captain)
  for (var i = 0; i < roster.length; i++) {
    if (roster[i].role === role) roster[i].role = 'Player';
  }

  // Assign the role to the clicked player
  roster[index].role = role;
  renderRosterArea();
}

function removePlayer(index, format) {
  var roster = getRoster(format);
  roster.splice(index, 1);
  renderRosterArea();
}

function addPlayer(format) {
  var inputId = 'addPlayerInput' + format;
  var input = document.getElementById(inputId);
  var raw = input.value.trim();
  if (!raw) return;

  // Check if already on this roster
  var roster = getRoster(format);
  var normalized = raw.replace(/\D/g, '');
  for (var i = 0; i < roster.length; i++) {
    if (roster[i].memberNumber === normalized) {
      alert('This player is already on the roster.');
      return;
    }
  }

  SPM.setStatus('Looking up #' + raw + '...');

  SPM.callServer('lookupMember', { memberNumber: raw }).then(function(data) {
    SPM.setStatus('');
    if (data.found) {
      roster.push({
        memberNumber: data.found ? normalized : normalized,
        playerName: data.playerName,
        role: 'Player',
        manualEntry: false
      });
      input.value = '';
      renderRosterArea();
    } else {
      // Show manual entry
      pendingManualApa = normalized;
      pendingManualFormat = format;
      var manualId = 'manualArea' + format;
      document.getElementById(manualId).innerHTML =
        '<div class="manual-entry-row">' +
        '<span style="font-size:0.85rem;color:var(--spm-primary)">APA #' + SPM.esc(normalized) + ' not found.</span>' +
        '</div>' +
        '<div class="manual-entry-row">' +
        '<input type="text" id="manualNameInput' + format + '" placeholder="Enter player name manually" ' +
        'onkeydown="if(event.key===\'Enter\')confirmManualEntry(\'' + format + '\')">' +
        '<button class="spm-btn spm-btn-secondary" onclick="confirmManualEntry(\'' + format + '\')">Add</button>' +
        '<button class="spm-btn spm-btn-danger" onclick="cancelManualEntry(\'' + format + '\')" style="min-width:auto;padding:8px 12px">&times;</button>' +
        '</div>';
    }
  }).catch(function() {
    SPM.setStatus('');
    alert('Network error looking up player.');
  });
}

function confirmManualEntry(format) {
  var nameInput = document.getElementById('manualNameInput' + format);
  var name = nameInput.value.trim();
  if (!name) { alert('Please enter the player name.'); return; }

  var roster = getRoster(format);
  roster.push({
    memberNumber: pendingManualApa,
    playerName: name,
    role: 'Player',
    manualEntry: true
  });
  pendingManualApa = '';
  pendingManualFormat = '';

  // Clear the add input too
  var addInput = document.getElementById('addPlayerInput' + format);
  if (addInput) addInput.value = '';

  renderRosterArea();
}

function cancelManualEntry(format) {
  pendingManualApa = '';
  pendingManualFormat = '';
  document.getElementById('manualArea' + format).innerHTML = '';
}

// ── Submit Registration ────────────────────────────────────────────
function submitRegistration() {
  var teamName = document.getElementById('regTeamName').value.trim();
  var divSelect = document.getElementById('regDivision');
  var dayTimeVal = divSelect ? divSelect.value : '';  // "Monday|6:30 PM"
  var hostLocation = document.getElementById('regHostLocation').value.trim();

  if (!teamName) { alert('Team name is required.'); return; }
  if (!dayTimeVal) { alert('Please select a day & time.'); return; }

  // Resolve day+time to a division ID. Pick the first matching active division.
  // For DJ, the backend handles format assignment.
  var parts = dayTimeVal.split('|');
  var selDay = parts[0], selTime = parts[1];
  var divisionId = '';
  for (var di = 0; di < availableDivisions.length; di++) {
    var ad = availableDivisions[di];
    if (ad.day === selDay && ad.time === selTime) {
      divisionId = ad.divisionId;
      break;
    }
  }
  if (!divisionId) { alert('No matching division found.'); return; }

  // Build payload
  var payload = {
    teamName: teamName,
    divisionId: divisionId,
    hostLocation: hostLocation,
    isReRegistration: currentFormIsReReg,
    originalTeamNumber: currentFormOrigTeam,
    isDjPair: currentFormIsDj,
    registeredBy: currentPlayer.memberNumber
  };

  if (currentFormIsDj) {
    // Extract captains from roster roles
    var capt8 = '', capt9 = '';
    for (var i = 0; i < currentRoster8.length; i++) {
      if (currentRoster8[i].role === 'Captain') capt8 = currentRoster8[i].memberNumber;
    }
    for (var j = 0; j < currentRoster9.length; j++) {
      if (currentRoster9[j].role === 'Captain') capt9 = currentRoster9[j].memberNumber;
    }
    payload.captain = capt8 || capt9 || currentPlayer.memberNumber;
    payload.coCaptain = '';
    payload.eightBallRoster = currentRoster8;
    payload.nineBallRoster = currentRoster9;
  } else {
    var capt = '', coCapt = '';
    for (var k = 0; k < currentRoster.length; k++) {
      if (currentRoster[k].role === 'Captain') capt = currentRoster[k].memberNumber;
      if (currentRoster[k].role === 'Co-Captain') coCapt = currentRoster[k].memberNumber;
    }
    payload.captain = capt || currentPlayer.memberNumber;
    payload.coCaptain = coCapt;
    payload.roster = currentRoster;
  }

  showLoading('Submitting registration...');
  document.getElementById('submitRegBtn').disabled = true;

  SPM.callServer('registerTeam', payload).then(function(data) {
    hideLoading();
    document.getElementById('submitRegBtn').disabled = false;

    if (!data.success) {
      alert(data.error || 'Registration failed.');
      return;
    }

    showConfirmation(data);
  }).catch(function() {
    hideLoading();
    document.getElementById('submitRegBtn').disabled = false;
    alert('Network error. Please try again.');
  });
}

// ── Confirmation Screen ────────────────────────────────────────────
function showConfirmation(data) {
  var esc = SPM.esc;
  var html = '<div class="spm-card confirm-card">';
  html += '<div class="checkmark">&#10003;</div>';
  html += '<h2>Registration Submitted!</h2>';
  html += '<p><strong>' + esc(data.teamName) + '</strong></p>';
  html += '<p>' + esc(data.format) + ' &middot; ' + esc(data.day) + '</p>';

  if (data.warnings && data.warnings.length > 0) {
    html += '<div class="confirm-warnings">';
    html += '<strong>Warnings:</strong><br>';
    for (var i = 0; i < data.warnings.length; i++) {
      html += esc(data.warnings[i]) + '<br>';
    }
    html += '</div>';
  }

  html += '<div class="action-bar" style="justify-content:center;margin-top:20px">';
  html += '<button class="spm-btn spm-btn-primary" onclick="doLookup()">Back to Dashboard</button>';
  html += '<button class="spm-btn spm-btn-secondary" onclick="showNewTeamForm()">Register Another Team</button>';
  html += '</div>';
  html += '</div>';

  document.getElementById('screenConfirm').innerHTML = html;
  showScreen('screenConfirm');
}

// ── Request Division Screen ────────────────────────────────────────
function showRequestForm() {
  document.getElementById('requestText').value = '';
  showScreen('screenRequest');
}

function submitRequest() {
  var text = document.getElementById('requestText').value.trim();
  if (!text) { alert('Please describe the division you want.'); return; }

  SPM.setStatus('Submitting request...');
  SPM.callServer('requestDivision', {
    memberNumber: currentPlayer.memberNumber,
    requestText: text
  }).then(function(data) {
    SPM.setStatus('');
    if (!data.success) { alert(data.error || 'Request failed.'); return; }
    alert('Your division request has been submitted. Thank you!');
    showDashboard();
  }).catch(function() {
    SPM.setStatus('');
    alert('Network error.');
  });
}
</script>
